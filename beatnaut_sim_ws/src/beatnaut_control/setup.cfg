# setup.cfg — Configuration supplémentaire pour le package Python
#
# Ce fichier est requis par ament_python pour indiquer comment
# installer les scripts console (entry_points).
#
# [develop] : configuration pour `pip install -e` (développement)
# [install]  : configuration pour l'installation normale

[develop]
script_dir=$base/lib/beatnaut_control

[install]
install_scripts=$base/lib/beatnaut_control
